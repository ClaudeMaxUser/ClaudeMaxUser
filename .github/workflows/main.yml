name: Profile Refresh

on:
  schedule:
    - cron: "0 */6 * * *"   # runs every 6 hours
  workflow_dispatch:         # lets you trigger it manually too
  push:
    branches: [main]

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-timestamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update last updated line
        run: |
          DATE=$(date -u "+%B %d, %Y — %H:%M UTC")
          sed -i "s/.*Last updated:.*/\*Last updated: $DATE\*/" README.md
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: refresh profile [skip ci]"
          git push
